# ==========================================
# GLOBAL LICENSE SYSTEM (ระบบลิขสิทธิ์ ขาย / ให้เช่าได้)
# ==========================================
license:
  enabled: true        # เปิดระบบลิขสิทธิ์ true=เปิด / false=ปิด
  key: "USER-001"      # รหัสลูกค้า
  plan: basic          # ประเภทแพ็กเกจ (basic / pro / vip)
  max_devices: 1       # ใช้งานได้กี่เครื่องพร้อมกัน
  expire_date: null    # ใส่วันหมดอายุ เช่น "2026-12-31" ถ้าไม่จำกัดให้ใช้ null
  allowed_platforms:   # อนุญาตให้โพสต์แพลตฟอร์มไหนบ้าง
    - tiktok



limits:
  basic:
    max_posts: 3
  pro:
    max_posts: 6
  vip:
    max_posts: 12

windows:
  - ["09:00", "12:00"]
  - ["13:00", "17:00"]
  - ["18:00", "22:00"]
# ==========================================
# STEP A : ระบบคัดเลือกสินค้า
# ==========================================
step_a:
  enabled: true   # เปิด/ปิด STEP A   true / false

  feed:
    file: data/product_feed.csv   # ไฟล์ข้อมูลสินค้าที่ใช้วิเคราะห์

  score:
    enabled: false   # เปิดระบบคำนวณคะแนนสินค้า

    weights:        # น้ำหนักคะแนน (ยิ่งมากยิ่งสำคัญ)
      price: 1.0
      discount: 1.2
      sold: 1.5
      rating: 1.0

    normalize:      # ค่าสูงสุดใช้ปรับสเกลคะแนน
      price_max: 250
      sold_max: 500
      discount_max: 50

    min_score: 0.0  # คะแนนขั้นต่ำที่ถือว่า "ผ่าน"
    auto_relax:
      enabled: true     # ถ้าไม่มีสินค้าผ่าน จะลดเกณฑ์ลงอัตโนมัติ
      relax_factor: 0.5 # ลดเกณฑ์ลงกี่ %

  affiliate:
    enabled: true
    universal_link: https://shopee.co.th/universal-link  # ลิงก์กลาง affiliate

  winners:
    enabled: false
    max_seed: 150     # เก็บสินค้าตัวท็อปไว้กี่ตัว

  images:
    enabled: true
    per_product: 10     # โหลดภาพสินค้าสูงสุดกี่ภาพต่อสินค้า
    max_products: 20    # โหลดภาพสูงสุดกี่สินค้า
    timeout: 10         # เวลารอโหลดภาพ (วินาที)


# ==========================================
# STEP B : ระบบสร้างวิดีโอ
# ==========================================
step_b:
  enabled: true   # เปิด/ปิดการสร้างวิดีโอ  true / false

  factory:
    max_videos_per_run: 15     # สร้างวิดีโอสูงสุดต่อรอบ
    shuffle_products: true    # สุ่มลำดับสินค้า
    shuffle_images: true      # สุ่มลำดับภาพ
    skip_if_exists: true      # ถ้ามีวิดีโอแล้วจะไม่สร้างซ้ำ

  images:
    min_images: 3
    max_images: 6
    clone_if_not_enough: true   # ถ้าภาพไม่พอจะคัดลอกซ้ำให้ครบ

  video:
    width: 1080
    height: 1920
    fps: 24
    min_duration: 10   # ความยาววิดีโอขั้นต่ำ (วินาที)
    max_duration: 20   # ความยาววิดีโอสูงสุด (วินาที)

  cinematic:
    enabled: true
    zoom_min: 1.1
    zoom_max: 1.3
    pan_x_min: 10
    pan_x_max: 40
    pan_y_min: 5
    pan_y_max: 25
    blur_radius: 0.8
    transition_duration: 0.4

  export:
    tiktok:
      width: 1080
      height: 1920
    facebook:
      width: 1080
      height: 1350
    shopee:
      width: 1080
      height: 1080

  lower_third:
    font: Sarabun-Bold.ttf
    text_color: [255, 255, 255]
    bg_opacity: 0.65
    padding_x: 60
    padding_y: 30
    margin_bottom: 120

  music:
    enabled: true
    volume: 0.6
    avoid_repeat: true   # หลีกเลี่ยงใช้เพลงซ้ำ

  qc:
    anti_black:
      enabled: true
      min_brightness: 20   # ป้องกันวิดีโอมืดเกินไป

  text:
    hook:
      enabled: true
      duration: 3.0
      font_size: 96
      texts:
        - "🔥 ลดแรงมาก!"
        - "ของมันต้องมี!"
        - "คนซื้อซ้ำเพียบ!"
        - "ห้ามพลาด!"

    promo:
      enabled: true
      font_size: 78
      texts:
        - "🚚 ส่งฟรี เก็บปลายทาง"
        - "✨ รีวิวแน่น 5 ดาว"
        - "💥 โปรวันนี้เท่านั้น"


# ==========================================
# STEP C : ระบบโพสต์อัตโนมัติ
# ==========================================
step_c:
  enabled: true

  # โหมดฟาร์ม
  farm_mode: "loop_forever"     # daily_stop / loop_forever
  mode: "auto_daily"            # stop_when_done / auto_daily

  # อุปกรณ์
  device_mode: sequential
  devices:
    - "192.168.1.103:5555"

  max_parallel_devices: 1

  # ==============================
  # DAILY CONTROL
  # ==============================
  daily_control:
    min_post_per_day: 3
    max_post_per_day: 7
    min_wait: 5400
    max_wait: 10800
    reset_hour: 0

  # ==============================
  # RETRY
  # ==============================
  retry:
    enabled: true
    max_retry: 2
    backoff_seconds: 30

  # ==============================
  # PLATFORM
  # ==============================
  platforms:
    tiktok:
      enabled: true
      priority: 1

    facebook:
      enabled: false
      priority: 2

    reels:
      enabled: false
      priority: 3

    shopee:
      enabled: false
      priority: 4

  # ==============================
  # CAPTION
  # ==============================
  caption:
    mode: random
    add_hashtags: true
    hashtag_limit: 8
    default_hashtags:
      - "#ของมันต้องมี"
      - "#รีวิวแน่น"
      - "#ของดีบอกต่อ"
      - "#โปรแรง"

  # ==============================
  # HUMAN DELAY
  # ==============================
  human_delay:
    enabled: true
    min_action_delay: 1.2
    max_action_delay: 2.5

  # ==============================
  # TIME WINDOWS (3 ช่วง = 3 โพสต์)
  # ==============================
  time_windows:
    - start: "00:10"
      end: "04:00"

    - start: "06:24"
      end: "08:15"

    - start: "11:32"
      end: "13:26"

    - start: "15:00"
      end: "17:48"

    - start: "18:40"
      end: "20:00"

    - start: "21:30"
      end: "23:30"


# ==========================================
# PATH
# ==========================================
paths:
  products: products
  user_images: user_images
  temp: temp
  output: output
  music: music
  fonts: fonts
  hashes: hashes
  meta: meta


# ==========================================
# AI
# ==========================================
ai:
  enabled: false


# ==========================================
# AUTO GIT
# ==========================================
git:
  enabled: true
  mode: step_a
  commit_message: "AUTO FARM UPDATE"